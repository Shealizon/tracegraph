services:
  tracegraph:
    build: .
    ports:
      - "8787:8787"
    environment:
      NODE_ENV: production
      TRACEGRAPH_DATA: /app/server-data
      CODEX_ENABLED: "0"
      PADDLEOCR_TOKEN: "${PADDLEOCR_TOKEN:-}"
    volumes:
      - tracegraph-data:/app/server-data
    restart: unless-stopped

volumes:
  tracegraph-data:
