server {
    listen 80;
    server_name graph.akusm.com;

    location ~ ^/\.well-known/acme-challenge/ {
        root /var/www/tracegraph;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name graph.akusm.com;

    ssl_certificate /etc/letsencrypt/live/graph.akusm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/graph.akusm.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:GraphSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/tracegraph;
    index index.html;
    charset utf-8;
    client_max_body_size 32m;

    location ~ ^/\.well-known/acme-challenge/ {
        root /var/www/tracegraph;
        default_type text/plain;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    location ~* \.(js|css|woff2?|ttf|png|jpg|jpeg|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~ /\. { deny all; }
}
